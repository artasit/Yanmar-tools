<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>แผนที่ลูกค้า (ระดับตำบล) - ยันม่าร์ สกลนคร</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
  :root{
    --navy:#1F3864; --blue:#2E5395; --accent:#E8A33D; --bg:#F3F5F9;
    --card:#FFFFFF; --text:#1E2430; --muted:#6B7280; --border:#E4E8F0;
    --green:#3E8E5A; --purple:#6C3483;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:'Tahoma','Segoe UI',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}
  .app{display:flex;flex-direction:column;height:100%;height:100dvh;}
  header{padding:10px 14px;background:var(--navy);color:#fff;flex-shrink:0;}
  header h1{font-size:15px;margin:0;font-weight:600;line-height:1.3;}
  header p{margin:2px 0 8px 0;font-size:11px;color:#C9D4EA;}
  .filters{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;}
  .filters select{padding:7px 10px;border-radius:8px;border:none;font-family:inherit;font-size:12px;flex-shrink:0;max-width:140px;}
  .body{flex:1;display:flex;min-height:0;position:relative;}
  #map{flex:1;min-width:0;height:100%;}
  .sidebar{width:380px;background:var(--card);border-left:1px solid var(--border);display:flex;flex-direction:column;min-height:0;}
  .sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .sidebar-header h2{margin:0 0 4px 0;font-size:15px;color:var(--navy);}
  .sidebar-header .meta{font-size:12px;color:var(--muted);}
  .header-btns{display:flex;gap:6px;flex-shrink:0;}
  .icon-btn{background:var(--border);border:none;border-radius:8px;width:32px;height:32px;font-size:14px;color:var(--navy);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .icon-btn.close-sheet{display:none;border-radius:50%;color:var(--muted);}
  .people-list{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;padding:8px 0;}
  .person{padding:10px 16px;border-bottom:1px solid var(--border);}
  .person .name{font-weight:600;font-size:13.5px;}
  .person .row{font-size:11.5px;color:var(--muted);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .call-link{color:var(--blue);text-decoration:none;font-weight:600;}
  .badge{display:inline-block;padding:1px 7px;border-radius:20px;font-size:10.5px;font-weight:600;}
  .b-retention{background:#DCEEE3;color:var(--green);}
  .b-fan{background:#FDEBD3;color:#B9770E;}
  .b-guarantor{background:#E3D9F3;color:var(--purple);}
  .b-other{background:#E5E7EB;color:#4B5563;}
  .empty-state{padding:30px 20px;text-align:center;color:var(--muted);font-size:13px;}
  .kpirow{display:flex;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);font-size:11.5px;color:var(--muted);flex-wrap:wrap;}
  .kpirow b{color:var(--navy);font-size:13px;}
  .search-box{padding:10px 16px;border-bottom:1px solid var(--border);}
  .search-box input{width:100%;padding:8px 10px;border-radius:8px;border:1px solid var(--border);font-family:inherit;font-size:13px;}
  .leaflet-popup-content{font-family:'Tahoma',sans-serif;font-size:12.5px;}
  .legend{position:absolute;bottom:10px;left:10px;background:#fff;padding:6px 10px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.2);font-size:10.5px;z-index:500;max-width:150px;}
  .legend div{display:flex;align-items:center;gap:5px;margin:2px 0;}
  .dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}

  #print-area{display:none;}

  @media print {
    header, .body > #map, .legend, .search-box, .icon-btn { display:none !important; }
    .sidebar{ display:none !important; }
    html,body{ overflow:visible !important; height:auto !important; }
    #print-area{
      display:block !important; padding:0; font-family:'Tahoma',sans-serif; color:#000;
    }
    #print-area h1{ font-size:15px; color:#1F3864; border-bottom:2px solid #1F3864; padding-bottom:6px; margin:0 0 4px 0; }
    #print-area .meta{ font-size:11px; color:#555; margin-bottom:10px; }
    #print-area table{ width:100%; border-collapse:collapse; font-size:10.5px; }
    #print-area th{ background:#1F3864 !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; text-align:left; padding:5px 6px; }
    #print-area td{ padding:5px 6px; border-bottom:1px solid #ddd; }
    #print-area tr{ break-inside:avoid; }
    @page{ size:A4 landscape; margin:10mm; }
  }

  /* Mobile: sidebar becomes a bottom sheet */
  @media (max-width:760px){
    header h1{font-size:13.5px;}
    header p{font-size:10px;}
    .body{flex-direction:column;}
    .sidebar{
      width:100%; position:absolute; left:0; right:0; bottom:0;
      max-height:0; overflow:hidden; border-left:none; border-top:1px solid var(--border);
      border-radius:16px 16px 0 0; box-shadow:0 -4px 16px rgba(0,0,0,.15);
      transition:max-height .25s ease; z-index:1000;
    }
    .sidebar.open{ max-height:70%; }
    .icon-btn.close-sheet{display:flex;}
    .sidebar-header{padding:12px 14px 8px 14px;}
    .drag-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:6px auto 0 auto;}
    .legend{font-size:9.5px;padding:5px 8px;max-width:130px;}
    .filters select{font-size:11px;padding:6px 8px;max-width:110px;}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>แผนที่ลูกค้า/ลีดสินเชื่อ ระดับตำบล — ยันม่าร์ สกลนคร</h1>
    <p>แตะจุดบนแผนที่เพื่อดูรายชื่อลูกค้าในตำบลนั้น</p>
    <div class="filters">
      <select id="f-group"><option value="">ทุกกลุ่มลูกค้า</option></select>
      <select id="f-year"><option value="">ทุกปี</option></select>
      <select id="f-province"><option value="">ทุกจังหวัด</option></select>
    </div>
  </header>
  <div class="body">
    <div id="map"></div>
    <div class="sidebar" id="sidebar">
      <div class="drag-handle" style="display:none" id="drag-handle"></div>
      <div class="sidebar-header">
        <div>
          <h2 id="sh-title">ภาพรวมทั้งหมด</h2>
          <div class="meta" id="sh-meta"></div>
        </div>
        <div class="header-btns">
          <button class="icon-btn" id="print-btn" title="พิมพ์รายชื่อนี้">🖨️</button>
          <button class="icon-btn close-sheet" id="close-sheet">✕</button>
        </div>
      </div>
      <div class="kpirow" id="kpirow"></div>
      <div class="search-box"><input id="search" placeholder="ค้นหาชื่อ/เบอร์โทรในจุดที่เลือก..."></div>
      <div class="people-list" id="people-list"></div>
    </div>
  </div>
</div>

<div id="print-area">
  <h1 id="print-title"></h1>
  <div class="meta" id="print-meta"></div>
  <table>
    <thead><tr><th>#</th><th>ชื่อ-นามสกุล</th><th>เบอร์โทร</th><th>ที่อยู่</th><th>กลุ่มลูกค้า</th></tr></thead>
    <tbody id="print-tbody"></tbody>
  </table>
</div>

: "แม่อาย", "tambon": "แม่อาย", "lat": 20.0303044, "lng": 99.2866869, "count": 1, "people": [{"name": "จรัญ ไวเจริญ", "group": "Retention (ลูกค้าเก่า)", "subgroup": "ลูกค้าเก่า Retention A", "phone": "0844812553, 0931313925", "address": "330 หมู่ 6 หมู่บ้านแม่ฮ่าง, ต.แม่อาย อ.แม่อาย จ.เชียงใหม่, 50280", "tambon": "แม่อาย", "district": "แม่อาย", "province": "เชียงใหม่", "model": "รถแทรกเตอร์ + SOLIS", "loan": "ไม่ระบุ/รอดำเนินการ", "year": 2026}]}, {"province": "เลย", "district": "เมืองเลย", "tambon": "นาอาน", "lat": 17.4524602, "lng": 101.7301247, "count": 1, "people": [{"name": "จารุณี สายจำปา", "group": "Retention (ลูกค้าเก่า)", "subgroup": "ลูกค้าเก่า Retention B (New)", "phone": "0621038285", "address": "524 หมู่ 1 หมู่บ้านติดต่อ, ต.นาอาน อ.เมืองเลย จ.เลย, 42000", "tambon": "นาอาน", "district": "เมืองเลย", "province": "เลย", "model": "บริษัทสงวนสิทธิ์ระบุรุ่นภายหลัง", "loan": "ไม่ระบุ/รอดำเนินการ", "year": 2026}]}], "total": 1571, "total_all": 1575};
const COLORS = {
  'Retention (ลูกค้าเก่า)': '#2E5395',
  'Yanmar Fan (กลุ่มเป้าหมายใหม่)': '#E8A33D',
  'ผู้ค้ำประกัน (Guarantor)': '#6C3483',
  'สมัครออนไลน์': '#3E8E5A'
};
const isMobile = window.matchMedia('(max-width:760px)').matches;

function badgeClass(g){
  if(g && g.includes('Retention')) return 'b-retention';
  if(g && g.includes('Fan')) return 'b-fan';
  if(g && g.includes('ค้ำ')) return 'b-guarantor';
  return 'b-other';
}

const map = L.map('map', {zoomControl:!isMobile, tap:true}).setView([17.2, 104.3], isMobile?8:9);
if(isMobile){ L.control.zoom({position:'bottomright'}).addTo(map); }
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 18
}).addTo(map);

const legend = L.control({position:'bottomleft'});
legend.onAdd = function(){
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = Object.entries(COLORS).map(([k,v])=>`<div><span class="dot" style="background:${v}"></span>${k}</div>`).join('');
  return div;
};
legend.addTo(map);

let clusterGroup = null;
let currentTambon = null;
let currentPrintList = [];
let currentPrintTitle = '';
let filters = {group:'', year:'', province:''};

function dominantColor(people){
  const counts = {};
  people.forEach(p=>{ counts[p.group]=(counts[p.group]||0)+1; });
  let best=null, bestN=-1;
  for(const [k,v] of Object.entries(counts)){ if(v>bestN){best=k;bestN=v;} }
  return COLORS[best] || '#607D8B';
}

function filteredPeople(t){
  return t.people.filter(p=>{
    if(filters.group && p.group!==filters.group) return false;
    if(filters.year && String(p.year)!==filters.year) return false;
    return true;
  });
}

function allFilteredPeople(){
  let out = [];
  DATA.tambons.forEach(t=>{
    if(filters.province && t.province!==filters.province) return;
    out = out.concat(filteredPeople(t));
  });
  return out;
}

function openSheet(){
  if(isMobile){
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('drag-handle').style.display = 'block';
  }
}
function closeSheet(){
  document.getElementById('sidebar').classList.remove('open');
}
document.getElementById('close-sheet').addEventListener('click', closeSheet);

function drawMarkers(){
  if(clusterGroup){ map.removeLayer(clusterGroup); }
  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 40,
    iconCreateFunction: function(cluster){
      const markers = cluster.getAllChildMarkers();
      let total = 0;
      markers.forEach(m=> total += m.options.peopleCount || 0);
      const size = isMobile ? 34 : 38;
      return L.divIcon({
        html: `<div style="background:#2E5395;color:#fff;border-radius:50%;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);">${total}</div>`,
        className: '', iconSize: [size,size]
      });
    }
  });

  DATA.tambons.forEach(t=>{
    if(filters.province && t.province!==filters.province) return;
    const people = filteredPeople(t);
    if(people.length===0) return;
    const radius = Math.max(isMobile?8:6, Math.min(22, 5 + Math.sqrt(people.length)*3));
    const color = dominantColor(people);
    const marker = L.circleMarker([t.lat, t.lng], {
      radius: radius, fillColor: color, color:'#fff', weight:2, fillOpacity:0.85, peopleCount: people.length
    });
    marker.bindTooltip(`ต.${t.tambon} อ.${t.district} (${t.province}): ${people.length} ราย`, {direction:'top'});
    marker.on('click', ()=> selectTambon(t));
    clusterGroup.addLayer(marker);
  });
  map.addLayer(clusterGroup);
}

function renderKPIs(){
  let total=0, tambons=0;
  const provinces = new Set();
  DATA.tambons.forEach(t=>{
    if(filters.province && t.province!==filters.province) return;
    const p = filteredPeople(t);
    if(p.length){ total += p.length; tambons++; provinces.add(t.province); }
  });
  document.getElementById('kpirow').innerHTML = `
    <div>ลีดที่แสดงบนแผนที่<br><b>${total.toLocaleString()}</b> ราย</div>
    <div>จำนวนตำบล<br><b>${tambons}</b></div>
    <div>จังหวัด<br><b>${provinces.size}</b></div>
  `;
}

function renderPeopleList(list, title, meta){
  document.getElementById('sh-title').textContent = title;
  document.getElementById('sh-meta').textContent = meta;
  currentPrintList = list;
  currentPrintTitle = title;
  const container = document.getElementById('people-list');
  if(list.length===0){
    container.innerHTML = '<div class="empty-state">ไม่พบข้อมูล แตะจุดบนแผนที่เพื่อดูรายชื่อ</div>';
    return;
  }
  container.innerHTML = list.map(p=>`
    <div class="person">
      <div class="name">${p.name||'-'}</div>
      <div class="row">
        <span class="badge ${badgeClass(p.group)}">${p.group||''}</span>
      </div>
      <div class="row">
        ${p.phone ? `<a class="call-link" href="tel:${p.phone.replace(/\s/g,'')}">📞 ${p.phone}</a>` : '<span>ไม่มีเบอร์</span>'}
        <span>${p.loan||''}</span>
        <span>${p.year||''}</span>
      </div>
    </div>
  `).join('');
}

function selectTambon(t){
  currentTambon = t;
  const people = filteredPeople(t);
  renderPeopleList(people, `ต.${t.tambon} อ.${t.district} จ.${t.province}`, `${people.length.toLocaleString()} ราย`);
  map.setView([t.lat, t.lng], isMobile?12:13);
  document.getElementById('search').value = '';
  openSheet();
}

function applySearchWithinTambon(){
  const q = document.getElementById('search').value.trim().toLowerCase();
  if(!currentTambon){
    // no tambon selected: search across all filtered people
    let people = allFilteredPeople();
    if(q){
      people = people.filter(p => ((p.name||'')+(p.phone||'')).toLowerCase().includes(q));
    }
    renderPeopleList(people, 'ภาพรวม (ตามตัวกรอง)', `${people.length.toLocaleString()} ราย`);
    return;
  }
  let people = filteredPeople(currentTambon);
  if(q){
    people = people.filter(p => ((p.name||'')+(p.phone||'')).toLowerCase().includes(q));
  }
  renderPeopleList(people, `ต.${currentTambon.tambon} อ.${currentTambon.district} จ.${currentTambon.province}`, `${people.length.toLocaleString()} ราย`);
}
document.getElementById('search').addEventListener('input', applySearchWithinTambon);

function doPrint(){
  const list = currentPrintList;
  if(!list || list.length===0){
    alert('ไม่มีรายชื่อให้พิมพ์ กรุณาเลือกจุดบนแผนที่ หรือปรับตัวกรองก่อน');
    return;
  }
  document.getElementById('print-title').textContent = 'รายชื่อลูกค้า/ลีดสำหรับติดตาม — ' + currentPrintTitle;
  document.getElementById('print-meta').textContent =
    `หจก.ยันม่าร์ สกลนคร | ${list.length.toLocaleString()} ราย | พิมพ์เมื่อ ${new Date().toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'})}`;
  document.getElementById('print-tbody').innerHTML = list.map((p,i)=>`
    <tr>
      <td>${i+1}</td>
      <td>${p.name||'-'}</td>
      <td>${p.phone||'-'}</td>
      <td>${p.address||''}</td>
      <td>${p.group||''}</td>
    </tr>`).join('');
  window.print();
}
document.getElementById('print-btn').addEventListener('click', doPrint);

function populateSelect(id, key){
  const sel = document.getElementById(id);
  const vals = new Set();
  DATA.tambons.forEach(t=> t.people.forEach(p=> { if(p[key]!==null && p[key]!==undefined) vals.add(p[key]); }));
  [...vals].sort().forEach(v=>{
    const opt = document.createElement('option');
    opt.value=v; opt.textContent=v;
    sel.appendChild(opt);
  });
}
populateSelect('f-group','group');
populateSelect('f-year','year');
(function populateProvince(){
  const sel = document.getElementById('f-province');
  const vals = new Set(DATA.tambons.map(t=>t.province));
  [...vals].sort().forEach(v=>{
    const opt=document.createElement('option'); opt.value=v; opt.textContent=v; sel.appendChild(opt);
  });
})();

['f-group','f-year','f-province'].forEach(id=>{
  document.getElementById(id).addEventListener('change', ()=>{
    filters.group = document.getElementById('f-group').value;
    filters.year = document.getElementById('f-year').value;
    filters.province = document.getElementById('f-province').value;
    drawMarkers();
    renderKPIs();
    if(currentTambon){
      const people = filteredPeople(currentTambon);
      renderPeopleList(people, `ต.${currentTambon.tambon} อ.${currentTambon.district} จ.${currentTambon.province}`, `${people.length.toLocaleString()} ราย`);
    } else {
      const people = allFilteredPeople();
      renderPeopleList(people, 'ภาพรวม (ตามตัวกรอง)', `${people.length.toLocaleString()} ราย`);
    }
  });
});

drawMarkers();
renderKPIs();
renderPeopleList(allFilteredPeople(), 'ภาพรวม (ตามตัวกรอง)', `${allFilteredPeople().length.toLocaleString()} ราย`);

setTimeout(()=> map.invalidateSize(), 200);
</script>
